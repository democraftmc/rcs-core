name: Publish API to GitHub Packages

on:
  release:
    types: [created]          # déclenché dès qu'une release GitHub est publiée
  workflow_dispatch:           # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: read
  packages: write              # obligatoire pour pousser vers GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish API to GitHub Packages
        run: ./gradlew :api:publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}   # fourni automatiquement par GitHub, aucun secret à créer

